services:
  minio-object-storage:
    image: minio/minio:latest
    container_name: track-hive-minio-storage
    restart: always                                   # container restart policy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://minio-object-storage:9000/minio/health/live"]
      start_period: 30s                               # wait for server to start before performing healthcheck
      retries: 3
      timeout: 10s
      # interval: 60s                                 # perform healthcheck only once
  mysql-database:
    image: mysql:latest
    container_name: track-hive-mysql-db
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql # database init sql script
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute='SHOW DATABASES;'"]
      start_period: 30s
      retries: 3
      timeout: 10s
  mongo-database:
    image: mongo:latest
    container_name: track-hive-mongo-db
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "mongosh admin -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet --eval 'db.serverStatus()'" ]
      start_period: 30s
      retries: 3
      timeout: 10s
  redis-database:
    image: redis:latest
    container_name: track-hive-redis-db
    restart: always 
    # command: redis-server --requirepass $REDIS_PASSWORD                     # does not expand env variable
    command: ["sh", "-c", "redis-server --requirepass $$REDIS_PASSWORD"]      # enable password authentication
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping" ]             # redis returns non zero exit code only if server is not responsive, even if ping fails due to wrong password, 0 is returned
      retries: 3
      timeout: 10s
